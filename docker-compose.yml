services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kuayle
      POSTGRES_PASSWORD: kuayle
      POSTGRES_DB: kuayle
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"

  backend:
    build: ./BE
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./BE:/app
      - uploads:/app/uploads
    environment:
      DATABASE_URL: postgres://kuayle:kuayle@postgres:5432/kuayle?sslmode=disable  # Use sslmode=require in production
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-in-production  # MUST be changed in production
      ENVIRONMENT: development  # Set to "production" in production
      # STORAGE_TYPE: s3
      # S3_ENDPOINT: http://seaweedfs:8333
      # S3_BUCKET: kuayle-uploads
      # S3_ACCESS_KEY: admin
      # S3_SECRET_KEY: admin

  # S3-compatible object storage (uncomment to use S3 storage locally)
  # seaweedfs:
  #   image: chrislusf/seaweedfs:latest
  #   restart: unless-stopped
  #   command: "server -s3 -dir=/data -s3.port=8333 -master.dir=/data/master -volume.dir.idx=/data/volume"
  #   ports:
  #     - "127.0.0.1:8333:8333"
  #     - "127.0.0.1:9333:9333"
  #   volumes:
  #     - seaweedfs:/data

  frontend:
    build:
      context: ./UI
      args:
        PUBLIC_DEMO_MODE: ${PUBLIC_DEMO_MODE:-false}
        PUBLIC_DEMO_USERS: ${PUBLIC_DEMO_USERS:-}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./UI:/app
      - /app/node_modules
    environment:
      PUBLIC_DEMO_MODE: ${PUBLIC_DEMO_MODE:-false}
      PUBLIC_DEMO_USERS: ${PUBLIC_DEMO_USERS:-}

volumes:
  pgdata:
  uploads:
  # seaweedfs:
