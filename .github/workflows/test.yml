name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./BE

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kuayle
          POSTGRES_PASSWORD: kuayle
          POSTGRES_DB: kuayle_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kuayle"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: BE/go.mod

      - name: Apply database migrations
        env:
          DATABASE_URL: postgres://kuayle:kuayle@localhost:5432/kuayle_test?sslmode=disable
        run: go run ./cmd/server migrate up

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgres://kuayle:kuayle@localhost:5432/kuayle_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-that-is-at-least-32-characters-long
        run: go test ./... -race -coverprofile=coverage.out -covermode=atomic -count=1

      - name: Show coverage summary
        run: go tool cover -func=coverage.out

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: backend-coverage
          path: BE/coverage.out

  frontend-check:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./UI

    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: UI/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Svelte check (type checking)
        run: npm run check

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Dev Machine browser tests
        run: npm run test:e2e

      - name: Upload Playwright failure artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ui-playwright-failure
          path: |
            UI/playwright-report
            UI/test-results
          if-no-files-found: ignore
          retention-days: 7

  web-check:
    name: Marketing Site Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./WEB

    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: WEB/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Svelte check (type checking)
        run: npm run check

      - name: Build + SEO validation
        run: npm run validate

      - name: Install responsive-test browser
        run: npx playwright install --with-deps chromium

      - name: Responsive layout tests
        run: npm run test:responsive
