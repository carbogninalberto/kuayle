name: Build & Push

on:
  release:
    types: [published]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/carbogninalberto

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main for release build
        if: github.event_name == 'release'
        uses: actions/checkout@v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Checkout pull request
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v7.0.0

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            version="${{ github.event.release.tag_name }}"
            number="${version#v}"
          else
            version="pr"
            number="0.0.0"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "number=$number" >> "$GITHUB_OUTPUT"

      - name: Bump UI version
        if: github.event_name == 'release'
        working-directory: UI
        run: npm version "${{ steps.version.outputs.number }}" --no-git-tag-version --allow-same-version

      - name: Commit version bump
        if: github.event_name == 'release'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add UI/package.json UI/package-lock.json

          if git diff --cached --quiet; then
            echo "Version is already ${{ steps.version.outputs.version }}"
          else
            git commit -m "bump(version): ${{ steps.version.outputs.version }}"
            git push origin HEAD:main
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'release'
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # All-in-one image
      - name: Build & push all-in-one
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'release' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/kuayle:latest
            ${{ env.IMAGE_PREFIX }}/kuayle:${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=all-in-one
          cache-to: type=gha,mode=max,scope=all-in-one

      # API-only image
      - name: Build & push API
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./BE
          file: ./BE/Dockerfile
          push: ${{ github.event_name == 'release' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/kuayle-api:latest
            ${{ env.IMAGE_PREFIX }}/kuayle-api:${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      # Web-only image
      - name: Build & push Web
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./UI
          file: ./UI/Dockerfile
          push: ${{ github.event_name == 'release' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/kuayle-web:latest
            ${{ env.IMAGE_PREFIX }}/kuayle-web:${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
