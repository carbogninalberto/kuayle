name: Build & Push

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/carbogninalberto

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build Images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      # All-in-one image
      - name: Build & push all-in-one
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/kuayle:latest
            ${{ env.IMAGE_PREFIX }}/kuayle:${{ steps.version.outputs.version || 'pr' }}
          cache-from: type=gha,scope=all-in-one
          cache-to: type=gha,mode=max,scope=all-in-one

      # API-only image
      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: ./BE
          file: ./BE/Dockerfile
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/kuayle-api:latest
            ${{ env.IMAGE_PREFIX }}/kuayle-api:${{ steps.version.outputs.version || 'pr' }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      # Web-only image
      - name: Build & push Web
        uses: docker/build-push-action@v6
        with:
          context: ./UI
          file: ./UI/Dockerfile
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/kuayle-web:latest
            ${{ env.IMAGE_PREFIX }}/kuayle-web:${{ steps.version.outputs.version || 'pr' }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
